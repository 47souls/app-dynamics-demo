services:
  order-service:
    image: order-service:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - postgres

  order-history-service:
    image: order-history-service:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka

  postgres:
    image: postgres
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    expose:
      - "5432"

  zookeeper:
    image: bitnami/zookeeper:3.9.1
    environment:
      ALLOW_ANONYMOUS_LOGIN: 'yes'
    ports:
      - "2181:2181"

